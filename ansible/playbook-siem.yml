---
- name: Application Deployment - Ubuntu SIEM Collector (Plain HTTP)
  hosts: siem_nodes
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Update apt repository cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisite system dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - gnupg
          - wget
          - curl
        state: present

    - name: Download Elastic public GPG signing key
      ansible.builtin.get_url:
        url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        dest: /usr/share/keyrings/elasticsearch-keyring.asc
        mode: '0644'

    - name: Add official Elastic 8.x repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.asc] https://artifacts.elastic.co/packages/8.x/apt stable main"
        filename: elastic-8.x
        state: present

    - name: Install Elasticsearch and Kibana packages
      ansible.builtin.apt:
        name:
          - elasticsearch
          - kibana
        state: present
        update_cache: true

    # --- THIS TASK IS CRITICAL ---
    - name: Persistently set vm.max_map_count inside sysctl config
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        regexp: '^vm.max_map_count'
        line: 'vm.max_map_count=262144'
        state: present

    - name: Apply virtual memory map configuration to live kernel immediately
      ansible.builtin.command: sysctl -w vm.max_map_count=262144

    # =========================================================================
    # CONFIGURATION LAYER: BYPASSING THE INTERACTIVE WIZARD VIA PLAIN HTTP
    # =========================================================================

    - name: Disable X-Pack Security inside Elasticsearch configuration
      ansible.builtin.lineinfile:
        path: /etc/elasticsearch/elasticsearch.yml
        regexp: '^xpack.security.enabled:'
        line: 'xpack.security.enabled: false'

    - name: Force Elasticsearch to listen on the internal LAN interface
      ansible.builtin.lineinfile:
        path: /etc/elasticsearch/elasticsearch.yml
        regexp: '^#?network.host:'
        line: 'network.host: 0.0.0.0'

    - name: Configure Kibana to bind globally and point to plain HTTP Elasticsearch
      ansible.builtin.blockinfile:
        path: /etc/kibana/kibana.yml
        block: |
          server.host: "0.0.0.0"
          elasticsearch.hosts: ["http://127.0.0.1:9200"]
          logging.root.level: info

    # =========================================================================
    # SERVICE INITIALIZATION
    # =========================================================================

    - name: Reload systemd daemon manager
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start and enable Elasticsearch utility
      ansible.builtin.systemd:
        name: elasticsearch
        state: started
        enabled: true

    - name: Start and enable Kibana dashboard interface
      ansible.builtin.systemd:
        name: kibana
        state: started
        enabled: true
